name: Post Blog Article

on:
  schedule:
    # Runs daily at 2:00 PM UTC = 9:00 AM EST / 10:00 AM EDT
    # The Python script skips non-Monday runs once 30 posts exist.
    - cron: "0 14 * * *"

  workflow_dispatch:
    # Lets you trigger a run manually from the Actions tab anytime

jobs:
  post:
    name: Generate and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai requests

      - name: Generate and publish article
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_URL:    ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_BLOG_HANDLE:  ${{ secrets.SHOPIFY_BLOG_HANDLE }}
          AUTHOR_NAME:          ${{ secrets.AUTHOR_NAME }}
        run: python generate_post.py
